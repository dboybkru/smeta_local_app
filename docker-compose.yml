services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smeta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smeta}
      POSTGRES_DB: smeta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smeta"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://smeta:${POSTGRES_PASSWORD:-smeta}@db:5432/smeta
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${WEB_HTTP_BIND:-80}:80"
      - "${WEB_HTTPS_BIND:-443}:443"
    depends_on:
      - backend

volumes:
  pgdata:
