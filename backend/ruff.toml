line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "I", "UP"]

[lint.per-file-ignores]
"alembic/env.py" = ["E402"]
# Миграции — авто/boilerplate, длинные строки допустимы.
"alembic/versions/*" = ["E501"]
# Тесты не входят в строгий гейт (app/ — единственный строгий): принятый стиль
# с `;` (E702), фикстурные/побочные импорты (F401), порядок импортов (I001),
# длинные строки (E501). app/ это НЕ касается — там ruff строгий.
"tests/**" = ["E501", "E702", "F401", "I001"]
